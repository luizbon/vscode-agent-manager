name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Compile
        env:
          TELEMETRY_CONNECTION_STRING: ${{ secrets.TELEMETRY_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Package Extension
        # Packages the .vsix with the correct version bump.
        # Publishing a pre-built .vsix skips vscode:prepublish entirely, so the
        # compiled output with injected keys is preserved through to publication.
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
          MINOR=$(echo $BASE_VERSION | cut -d. -f2)
          PATCH=$(echo $BASE_VERSION | cut -d. -f3)

          # Odd minor → release bumps minor; even minor → release bumps patch.
          if [ $((MINOR % 2)) -ne 0 ]; then
            RELEASE_BUMP="minor"
            PRERELEASE_BUMP="patch"
            RELEASE_VERSION="$MAJOR.$((MINOR + 1)).0"
            PRERELEASE_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          else
            RELEASE_BUMP="patch"
            PRERELEASE_BUMP="minor"
            RELEASE_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            PRERELEASE_VERSION="$MAJOR.$((MINOR + 1)).0"
          fi

          # Package release .vsix (version bumped inline, no git tag yet).
          npx @vscode/vsce package "$RELEASE_BUMP" --no-git-tag-version --out "release.vsix"

          # Restore package.json to base version before packaging pre-release.
          git checkout -- package.json

          # Package pre-release .vsix.
          npx @vscode/vsce package "$PRERELEASE_BUMP" --no-git-tag-version --pre-release --out "prerelease.vsix"

          # Restore again so downstream git operations have the original version.
          git checkout -- package.json

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "PRERELEASE_VERSION=$PRERELEASE_VERSION" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            out/
            resources/
            package.json
            package-lock.json
            .vscodeignore
            README.md
            vscode.config.mjs
            release.vsix
            prerelease.vsix

  test:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        # Run the test runner directly to skip the `pretest` hook, which would
        # recompile from the uninjected source and overwrite the compiled artifacts.
        run: xvfb-run -a npx vscode-test --config vscode.config.mjs

      - name: Run Tests (Windows/Mac)
        if: runner.os != 'Linux'
        run: npx vscode-test --config vscode.config.mjs

  release:
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Publish to VS Code Marketplace
        # Publish the pre-built .vsix produced in the build job.
        # Publishing a .vsix file bypasses vscode:prepublish, so the compiled
        # output with injected telemetry keys is preserved exactly as built.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npx @vscode/vsce publish --packagePath release.vsix -p ${{ secrets.VSCE_PAT }}

          # Tag the version that was baked into the .vsix during build.
          BASE=$(node -p "require('./package.json').version")
          MAJOR=$(echo $BASE | cut -d. -f1)
          MINOR=$(echo $BASE | cut -d. -f2)
          PATCH=$(echo $BASE | cut -d. -f3)
          if [ $((MINOR % 2)) -ne 0 ]; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          git tag "v$NEW_VERSION"
          git push origin HEAD:main --follow-tags

  prerelease:
    needs: [build, test]
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pre-release')
    runs-on: ubuntu-latest
    environment: Pre-Release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Publish Pre-release to VS Code Marketplace
        # Publish the pre-built .vsix produced in the build job.
        # Publishing a .vsix file bypasses vscode:prepublish, so the compiled
        # output with injected telemetry keys is preserved exactly as built.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npx @vscode/vsce publish --packagePath prerelease.vsix -p ${{ secrets.VSCE_PAT }}

          # Tag the pre-release version baked into the .vsix during build.
          BASE=$(node -p "require('./package.json').version")
          MAJOR=$(echo $BASE | cut -d. -f1)
          MINOR=$(echo $BASE | cut -d. -f2)
          PATCH=$(echo $BASE | cut -d. -f3)
          if [ $((MINOR % 2)) -eq 0 ]; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          git tag "v$NEW_VERSION-pre"
          git push origin HEAD:${{ github.head_ref }} --follow-tags
